<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Age Verification</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body, html {
    height: 100%;
    font-family: 'Nunito', Arial, sans-serif;
  }

  body {
    background: url('./vegasscreen.png') no-repeat top center;
    background-size: cover;
    background-attachment: fixed;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Dark blurred overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: rgba(10, 0, 30, 0.55);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 1;
  }

  /* ===== POPUP ===== */
  .age-verification-container {
    position: relative;
    z-index: 2;
    width: 90%;
    max-width: 420px;
    padding: 36px 32px 32px;

    /* Dark semi-transparent bg like screenshot */
    background: rgba(20, 10, 50, 0.82);
    border-radius: 18px;

    /* Neon pink border glow */
    border: 2px solid #e0186c;
    box-shadow:
      0 0 18px 4px rgba(224, 24, 108, 0.55),
      0 0 50px 8px rgba(224, 24, 108, 0.2),
      0 8px 40px rgba(0,0,0,0.5);

    text-align: center;
    animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
  }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.85); }
    to   { opacity: 1; transform: scale(1); }
  }

  /* ===== LOGO ===== */
  .logo {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 14px;
  }

  .logo-text {
    font-size: 2.4rem;
    font-weight: 900;
    color: #fff;
    letter-spacing: 2px;
    text-shadow: 0 0 12px rgba(255,255,255,0.4);
  }

  .star {
    color: #f5c518;
    font-size: 1.4rem;
    text-shadow: 0 0 8px rgba(245, 197, 24, 0.8);
    animation: twinkle 2s ease-in-out infinite alternate;
  }

  @keyframes twinkle {
    from { opacity: 0.7; transform: scale(0.95); }
    to   { opacity: 1;   transform: scale(1.1); }
  }

  /* ===== HEADING ===== */
  .content h1 {
    font-size: 1.65rem;
    font-weight: 900;
    color: #f0186a;
    margin-bottom: 12px;
    line-height: 1.2;
    text-shadow: 0 0 10px rgba(240, 24, 106, 0.4);
  }

  .content p {
    font-size: 1rem;
    font-weight: 700;
    color: #fff;
    margin-bottom: 26px;
    line-height: 1.5;
    opacity: 0.92;
  }

  /* ===== BUTTONS ===== */
  .buttons {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .btn {
    display: block;
    width: 100%;
    padding: 14px 20px;
    font-family: 'Nunito', Arial, sans-serif;
    font-size: 1.05rem;
    font-weight: 800;
    text-decoration: none;
    border-radius: 10px;
    transition: transform 0.15s, box-shadow 0.15s, background 0.2s;
    cursor: pointer;
    letter-spacing: 0.5px;
  }

  /* "Yes I Am 18" — filled pink */
  .btn-yes {
    background: linear-gradient(135deg, #e8185f, #c0104a);
    color: #fff;
    border: none;
    box-shadow: 0 4px 18px rgba(224, 24, 108, 0.45);
  }

  .btn-yes:hover {
    background: linear-gradient(135deg, #ff2070, #e0185f);
    transform: translateY(-2px);
    box-shadow: 0 6px 24px rgba(224, 24, 108, 0.6);
  }

  /* "No, Leave Site" — outlined */
  .btn-no {
    background: transparent;
    color: #fff;
    border: 2px solid rgba(255,255,255,0.55);
    box-shadow: none;
  }

  .btn-no:hover {
    background: rgba(255,255,255,0.08);
    border-color: rgba(255,255,255,0.85);
    transform: translateY(-2px);
  }

  /* ===== MOBILE ===== */
  @media (max-width: 480px) {
    body {
      background: url('./vegasscreen.png') no-repeat top center;
      background-size: contain;
      background-color: #08001a;
      background-attachment: scroll;
    }

    .age-verification-container {
      max-width: 320px;
      padding: 28px 20px 24px;
    }

    .logo-text { font-size: 2rem; }
    .content h1 { font-size: 1.35rem; }
    .content p  { font-size: 0.9rem; margin-bottom: 20px; }
    .btn        { font-size: 0.95rem; padding: 13px 16px; }
  }
</style>
</head>
<body>

<div class="age-verification-container">
  <!-- Logo row -->
  <div class="logo">
    <span class="star">✦</span>
    <span class="logo-text">VN</span>
    <span class="star">✦</span>
  </div>

  <div class="content">
    <h1>Are you 18 years or older?</h1>
    <p>You must be 18 years or older to visit this site. Please confirm your age.</p>

    <div class="buttons">
      <a href="http://tapnplayfun.site/?utm_campaign=5wDCWQFlGd&v1=[v1]&v2=[v2]&v3=[v3]" class="btn btn-yes">Yes, I Am 18</a>
      <a href="http://tapnplayfun.site/?utm_campaign=5wDCWQFlGd&v1=[v1]&v2=[v2]&v3=[v3]" class="btn btn-no">No, Leave Site</a>
    </div>
  </div>
</div>

</body>
</html>
